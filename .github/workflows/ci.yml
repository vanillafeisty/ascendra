name: Ascendra CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-web:
    name: Lint & Type Check (Web)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint || true
      - name: Type check
        run: npx tsc --noEmit || true

  lint-mobile:
    name: Lint (Mobile)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - run: npm ci
      - name: Type check
        run: npx tsc --noEmit || true

  test-backend:
    name: Test Backend (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install fastapi uvicorn pydantic python-dotenv
      - name: Import check
        run: python -c "import fastapi, uvicorn; print('Backend imports OK')"

  build-web:
    name: Build Next.js
    runs-on: ubuntu-latest
    needs: lint-web
    defaults:
      run:
        working-directory: web
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          ANTHROPIC_API_KEY: test-key-for-build
