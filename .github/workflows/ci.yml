name: Ascendra CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Python 3.11)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install core deps
        run: pip install fastapi uvicorn pydantic python-dotenv groq
      - name: Syntax check
        run: |
          python -m py_compile api.py
          python -m py_compile server/config.py
          for f in server/tools/*.py; do python -m py_compile "$f"; done
          echo "✅ All Python syntax OK"
      - name: Import check
        run: python -c "import fastapi, uvicorn, pydantic; print('✅ Core imports OK')"

  web:
    name: Web (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm install
      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: true
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_BACKEND_URL: http://localhost:8000

  mobile:
    name: Mobile (Expo)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - run: npm install
      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: true
